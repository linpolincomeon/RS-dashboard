<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TomEnergy — CEO Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🔥</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--surface:#fff;--surface2:#f0efeb;
  --text:#1a1a18;--text2:#6b6a65;--text3:#9c9b96;
  --accent:#c8360e;--accent-light:#fef0ec;
  --blue:#1a5fb4;--blue-light:#e8f0fc;
  --green:#0f6e56;--green-light:#e1f5ee;
  --amber:#854f0b;--amber-light:#faeeda;
  --red:#a32d2d;--red-light:#fcebeb;
  --purple:#6b3fa0;--purple-light:#f3edfc;
  --border:#e5e4df;--border2:#d3d1c7;
  --radius:10px;--radius-lg:14px;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.container{max-width:1320px;margin:0 auto;padding:1.5rem 2rem 3rem}
/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
.header h1{font-size:20px;font-weight:500;letter-spacing:-0.02em}
.header h1 b{color:var(--accent);font-weight:700}
.hdr-r{display:flex;align-items:center;gap:12px}
.ts{font-size:11px;color:var(--text3)}
.btn{font-family:inherit;font-size:12px;font-weight:500;padding:6px 16px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);cursor:pointer;transition:all .15s}
.btn:hover{background:var(--surface2)}
/* Tabs */
.tabs{display:flex;gap:3px;margin-bottom:.75rem;background:var(--surface2);padding:3px;border-radius:var(--radius);width:fit-content}
.tab{font-family:inherit;font-size:12px;font-weight:400;padding:6px 18px;border:none;border-radius:8px;background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.tab.active{background:var(--surface);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.06)}
/* Week filter */
.filters{display:flex;gap:4px;margin-bottom:1.25rem;align-items:center;flex-wrap:wrap}
.wf{font-family:inherit;font-size:11px;font-weight:500;padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text3);cursor:pointer;transition:.15s}
.wf:hover{color:var(--text2);border-color:var(--border2)}
.wf.on{background:var(--accent-light);color:var(--accent);border-color:var(--accent);font-weight:600}
.fl{font-size:11px;color:var(--text3);margin-left:8px}
/* KPIs */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:1.5rem}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.c-accent::before{background:var(--accent)}
.kpi.c-blue::before{background:var(--blue)}
.kpi.c-green::before{background:var(--green)}
.kpi.c-amber::before{background:var(--amber)}
.kpi.c-red::before{background:var(--red)}
.kpi.c-purple::before{background:var(--purple)}
.kpi-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;font-weight:500}
.kpi-val{font-size:26px;font-weight:700;letter-spacing:-0.03em;line-height:1.1}
.kpi-delta{font-size:11px;margin-top:4px;font-weight:500}
.kpi-delta.up{color:var(--green)}.kpi-delta.dn{color:var(--red)}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px}
/* Charts */
.chart-row{display:grid;gap:16px;margin-bottom:1.5rem}
.chart-row.two{grid-template-columns:1fr 1fr}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem}
.chart-title{font-size:13px;font-weight:600;margin-bottom:.75rem;display:flex;align-items:center;justify-content:space-between}
.badge{font-size:10px;font-weight:500;color:var(--text3);background:var(--surface2);padding:2px 10px;border-radius:20px}
.chart-wrap{position:relative;height:240px}
/* Table */
.section-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:1.5rem 0 .5rem;font-weight:600}
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;color:var(--text3);font-weight:600;padding:6px 8px;border-bottom:2px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.04em}
td{padding:6px 8px;border-bottom:1px solid var(--surface2);color:var(--text2)}
tr:hover td{background:rgba(200,54,14,.02)}
.r{text-align:right}
.hi{color:var(--text);font-weight:600}
.ok{color:var(--green)}.bad{color:var(--red)}
.note{font-size:10px;color:var(--text3);margin-top:6px}
/* Panels */
.panel{display:none}.panel.active{display:block}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:14px}
.loading h3{font-size:16px;font-weight:500;color:var(--text2)}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{margin-top:2rem;padding:8px 0;border-top:1px solid var(--border);font-size:10px;color:var(--text3);display:flex;justify-content:space-between}
@media(max-width:800px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .chart-row.two{grid-template-columns:1fr}
  .container{padding:1rem}
}
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <h1><b>TomEnergy</b> CEO Dashboard</h1>
    <div class="hdr-r">
      <span class="ts" id="timestamp"></span>
      <button class="btn" onclick="location.reload()">Actualizar</button>
    </div>
  </header>
  <div id="loading" class="loading"><div class="spinner"></div><h3>Cargando datos...</h3></div>
  <div id="main" style="display:none">
    <div class="tabs" id="tabs"></div>
    <div class="filters" id="filters"></div>
    <div class="panel active" id="p-ventas"></div>
    <div class="panel" id="p-gerencia"></div>
    <div class="panel" id="p-cobranza"></div>
    <div class="panel" id="p-caja"></div>
  </div>
</div>
<div class="container"><div class="footer"><span>TomEnergy · CEO Dashboard</span><span id="ftr"></span></div></div>
<script>
let D=null, curTab='ventas', fN=16, selW=0;
const charts={};
const C={accent:'#c8360e',blue:'#1a5fb4',green:'#0f6e56',amber:'#854f0b',red:'#a32d2d',purple:'#6b3fa0',teal:'#0f7b6c'};
const fM=n=>!n&&n!==0?'—':'$'+(n/1e6).toFixed(1)+'M';
const fK=n=>!n&&n!==0?'—':Math.round(n/1000).toLocaleString('es-CL')+'K';
const fNum=n=>!n&&n!==0?'—':Math.round(n).toLocaleString('es-CL');
const fP=n=>!n&&n!==0?'—':(n*100).toFixed(1)+'%';
const pD=(c,p)=>(!c||!p)?null:((c-p)/Math.abs(p))*100;
const dH=d=>{if(d==null)return'';const u=d>=0;return`<div class="kpi-delta ${u?'up':'dn'}">${u?'▲':'▼'} ${Math.abs(d).toFixed(1)}%</div>`};
function setupTabs(){
  const tabDefs=[['ventas','Ventas'],['gerencia','Gerencia'],['cobranza','Cobranza'],['caja','Caja']];
  document.getElementById('tabs').innerHTML=tabDefs.map(([k,l])=>
    `<button class="tab ${k===curTab?'active':''}" onclick="switchTab('${k}')">${l}</button>`
  ).join('');
  if(curTab==='ventas'||curTab==='gerencia'||curTab==='caja'){
    const ws=D.weeks[selW];
    document.getElementById('filters').innerHTML=[4,8,16].map(n=>
      `<button class="wf ${fN===n?'on':''}" onclick="setFilter(${n})">${n}S</button>`
    ).join('')+`<span class="fl">${ws.label}${ws.parcial?' (parcial)':''} · Jue→Mié</span>`
    +'<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;width:100%">'
    +D.weeks.slice(0,fN).map((w,i)=>
      `<button class="wf${i===selW?' on':''}" onclick="selectWeek(${i})" style="font-size:10px;padding:3px 8px">${w.label}${w.parcial?' *':''}</button>`
    ).join('')+'</div>';
  } else {
    document.getElementById('filters').innerHTML='';
  }
}
function switchTab(t){
  curTab=t;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('p-'+t).classList.add('active');
  setupTabs();render();
}
function setFilter(n){fN=n;if(selW>=n)selW=0;render()}
function selectWeek(i){selW=i;render()}
function render(){
  if(curTab==='ventas') renderVentas();
  else if(curTab==='gerencia') renderGerencia();
  else if(curTab==='cobranza') renderCobranza();
  else renderCaja();
  setupTabs();
}
// ── VENTAS ──
function renderVentas(){
  const el=document.getElementById('p-ventas');
  const wk=[...D.weeks.slice(0,fN)].reverse();
  const last=D.weeks[selW], prev=D.weeks[selW+1]||last;
  const dv=last.ppto>0?last.litros/last.ppto:0;
  let h='<div class="kpi-grid">';
  const mc=last.margin_contado||0, mcr=last.margin_credito||0;
  const hasNewMargins=last.margin_contado!==undefined&&last.margin_contado!==null;
  h+=kpi('Venta Semana',fM(last.ventas),pD(last.ventas,prev.ventas),'c-accent',`${last.facturas} fact · ${last.clientes} cli`);
  h+=kpi('Litros',fK(last.litros),pD(last.litros,prev.litros),'c-blue',`$${fNum(last.precio_bruto||last.precio_neto||last.precio||0)}/L bruto`);
  h+=kpi('Litros vs Ppto',(dv*100).toFixed(0)+'%',null,dv>=.8?'c-green':dv>=.6?'c-amber':'c-red',`Meta: ${fK(last.ppto)} · Real: ${fK(last.litros)}`);
  if(hasNewMargins){
    h+=kpi('Margen Contado',fP(mc),pD(mc,prev.margin_contado||0),mc>=.12?'c-green':mc>=.10?'c-amber':'c-red','meta 12%');
    h+=kpi('Margen Crédito',fP(mcr),pD(mcr,prev.margin_credito||0),mcr>=.09?'c-green':mcr>=.07?'c-amber':'c-red','meta 9%');
  } else {
    h+=kpi('Margen Bruto',fP(last.margin),pD(last.margin,prev.margin),last.margin>=.10?'c-green':'c-red','margin_zone ponderado');
  }
  h+=kpi('Recaudación',fM(last.recaud),pD(last.recaud,prev.recaud||1),'c-purple',`Transf: ${fM(last.transf||0)} · Cheq: ${fM(last.cheques)} · Fact: ${fM(last.factoring||0)}`);
  h+='</div>';
  h+='<div class="chart-row two">';
  h+='<div class="chart-card"><div class="chart-title">Litros por semana <span class="badge">Jue→Mié</span></div><div class="chart-wrap"><canvas id="cLitros"></canvas></div></div>';
  h+='<div class="chart-card"><div class="chart-title">Litros vs Presupuesto <span class="badge">Real vs Meta</span></div><div class="chart-wrap"><canvas id="cPpto"></canvas></div></div>';
  h+='</div><div class="chart-row two">';
  h+='<div class="chart-card"><div class="chart-title">Margen bruto % <span class="badge">margin_zone</span></div><div class="chart-wrap"><canvas id="cMargin"></canvas></div></div>';
  h+='<div class="chart-card"><div class="chart-title">Recaudación vs Compras ENAP <span class="badge">CLP</span></div><div class="chart-wrap"><canvas id="cRecaud"></canvas></div></div>';
  h+='</div>';
  // Daily sales chart
  const dyData=D.daily||[];
  if(dyData.length>0){
    h+='<div class="chart-row" style="grid-template-columns:1fr;margin-top:1rem">';
    h+='<div class="chart-card"><div class="chart-title">Venta diaria en litros <span class="badge">Últimos 16 días hábiles</span></div><div class="chart-wrap"><canvas id="cDaily"></canvas></div></div>';
    h+='</div>';
  }
  h+='<div class="section-label">Resumen semanal</div>';
  h+='<div class="table-card"><table><thead><tr>';
  const hasNM=D.weeks[0].margin_contado!==undefined&&D.weeks[0].margin_contado!==null;
  h+='<th>Semana</th><th class="r">Ventas</th><th class="r">Litros</th><th class="r">Desv.</th>';
  if(hasNM){h+='<th class="r">M.Contado</th><th class="r">M.Crédito</th>';}else{h+='<th class="r">Margen</th>';}
  h+='<th class="r">$/L</th><th class="r">Recaud.</th><th class="r">Compras</th>';
  if(hasNM) h+='<th class="r">Cheq.Cart.</th>';
  h+='</tr></thead><tbody>';
  D.weeks.slice(0,fN).forEach((w,i)=>{
    const dv2=w.ppto>0?w.litros/w.ppto:0;
    const sel=i===selW;
    h+=`<tr style="${sel?'background:var(--accent-light)':''}"><td class="${sel?'hi':''}">${w.label}${w.parcial?' *':''}</td>`;
    h+=`<td class="r">${fM(w.ventas)}</td>`;
    h+=`<td class="r">${fK(w.litros)}</td>`;
    h+=`<td class="r ${dv2>=.8?'ok':'bad'}">${(dv2*100).toFixed(0)}%</td>`;
    if(hasNM){
      const wmc=w.margin_contado||0, wmcr=w.margin_credito||0;
      h+=`<td class="r ${wmc>=.12?'ok':wmc>=.10?'':'bad'}">${fP(wmc)}</td>`;
      h+=`<td class="r ${wmcr>=.09?'ok':wmcr>=.07?'':'bad'}">${fP(wmcr)}</td>`;
    } else {
      h+=`<td class="r ${w.margin>=.10?'ok':''}">${fP(w.margin)}</td>`;
    }
    h+=`<td class="r">$${fNum(w.precio_bruto||w.precio_neto||w.precio||0)}</td>`;
    h+=`<td class="r">${fM(w.recaud)}</td>`;
    h+=`<td class="r">${fM(w.compras_odoo||w.compras_enap||0)}</td>`;
    if(hasNM) h+=`<td class="r">${fM(w.cheq_cartera_saldo||0)}</td>`;
    h+=`</tr>`;
  });
  h+='</tbody></table><div class="note">* Parcial · Margen = margin_zone (Odoo) · NC descontadas · Semana comercial Jue→Mié</div></div>';
  el.innerHTML=h;
  // Charts
  const labels=wk.map(w=>w.label.split('-')[0]);
  const gC='rgba(0,0,0,.04)', tC='#9c9b96';
  // Litros por semana — bars + presupuesto dashed line
  dc('cL');charts.cL=new Chart(document.getElementById('cLitros'),{type:'bar',
    data:{labels,datasets:[
      {label:'Litros',data:wk.map(w=>w.litros),backgroundColor:wk.map((_,i)=>i===wk.length-1?C.accent+'cc':C.accent+'44'),borderRadius:5,order:1},
      {label:'Presupuesto',data:wk.map(w=>w.ppto),type:'line',borderColor:C.amber,backgroundColor:'transparent',pointRadius:0,borderWidth:2,borderDash:[6,4],tension:0,order:0}
    ]},
    options:co(tC,gC,v=>fK(v))});
  // Litros vs Presupuesto — colored bars + ppto line
  dc('cP');charts.cP=new Chart(document.getElementById('cPpto'),{type:'bar',
    data:{labels,datasets:[
      {label:'Real',data:wk.map(w=>w.litros),backgroundColor:wk.map(w=>w.litros>=w.ppto?C.green+'88':C.red+'66'),borderRadius:5},
      {label:'Presupuesto',data:wk.map(w=>w.ppto),type:'line',borderColor:C.amber,backgroundColor:'transparent',pointRadius:0,borderWidth:2,borderDash:[5,3],tension:0}
    ]},options:co(tC,gC,v=>fK(v))});
  dc('cM');charts.cM=new Chart(document.getElementById('cMargin'),{type:'bar',
    data:{labels,datasets:[{data:wk.map(w=>+(w.margin*100).toFixed(2)),
      backgroundColor:wk.map(w=>w.margin>=.12?C.green+'88':w.margin>=.10?C.blue+'66':C.red+'66'),borderRadius:5}]},
    options:co(tC,gC,v=>v.toFixed(1)+'%')});
  dc('cR');charts.cR=new Chart(document.getElementById('cRecaud'),{type:'bar',
    data:{labels,datasets:[
      {label:'Recaudación',data:wk.map(w=>Math.round(w.recaud/1e6)),backgroundColor:C.purple+'55',borderRadius:5},
      {label:'Compras ENAP',data:wk.map(w=>Math.round((w.compras_odoo||w.compras_enap||0)/1e6)),type:'line',borderColor:C.red,backgroundColor:'transparent',pointRadius:2,pointBackgroundColor:C.red,borderWidth:2,tension:.3}
    ]},options:co(tC,gC,v=>'$'+v+'M')});
  // Daily chart
  const dy=D.daily||[];
  if(dy.length>0){
    const dRev=[...dy].reverse();
    const dLabels=dRev.map(d=>d.date+' '+d.day);
    dc('cD');charts.cD=new Chart(document.getElementById('cDaily'),{type:'bar',
      data:{labels:dLabels,datasets:[{data:dRev.map(d=>d.litros),
        backgroundColor:dRev.map(d=>d.day==='Lun'?C.blue+'88':d.litros>50000?C.accent+'77':C.accent+'44'),
        borderRadius:5}]},
      options:co(tC,gC,v=>fK(v))});
  }
}
// ── GERENCIA ──
function renderGerencia(){
  const el=document.getElementById('p-gerencia');
  const wk=[...D.weeks.slice(0,fN)].reverse();
  const last=D.weeks[selW], prev=D.weeks[selW+1]||last;
  const G=D.gerencia_goals||{};
  const mc=last.margin_contado||0, mcr=last.margin_credito||0;
  const mMeta=G.margen_contado_meta||0.12, crMeta=G.margen_credito_meta||0.09;
  const visMeta=G.visitas_semana||30, cnMeta=G.clientes_nuevos_semana||2;
  const slaTgt=G.sla_target||95;
  const dv=last.ppto>0?last.litros/last.ppto:0;

  let h='<div class="kpi-grid">';
  h+=kpi('Margen Contado',fP(mc),pD(mc,prev.margin_contado||0),mc>=mMeta?'c-green':mc>=mMeta*.85?'c-amber':'c-red',`Meta: ${fP(mMeta)} · ${last.facturas_contado||'—'} facturas`);
  h+=kpi('Margen Crédito',fP(mcr),pD(mcr,prev.margin_credito||0),mcr>=crMeta?'c-green':mcr>=crMeta*.85?'c-amber':'c-red',`Meta: ${fP(crMeta)} · ${last.facturas_credito||'—'} facturas`);
  h+=kpi('Litros vs Ppto',(dv*100).toFixed(0)+'%',null,dv>=.8?'c-green':dv>=.6?'c-amber':'c-red',`Meta: ${fK(last.ppto)} · Real: ${fK(last.litros)}`);
  h+=kpi('Visitas',fNum(last.visitas||0),pD(last.visitas||0,prev.visitas||1),'c-blue',`Meta: ${visMeta}/sem`);
  h+=kpi('Cotiz. Canceladas',fNum(last.cotiz_canceladas||0),null,'c-amber','sale.order cancel');
  h+=kpi('Clientes Nuevos',fNum(last.clientes_nuevos||0),null,(last.clientes_nuevos||0)>=cnMeta?'c-green':'c-red',`Meta: ${cnMeta}/sem`);
  h+='</div>';

  // ═══ SECTION 1: COMERCIAL — Margin by payment term ═══
  h+='<div class="section-label">Comercial — Margen por Plazo de Pago</div>';
  const mbt=last.margin_by_term||{};
  const termOrder=['Prepago','1 Día','7 Días','15 Días','30 Días','45 Días','60 Días','90 Días','150 Días'];
  const sortedTerms=Object.keys(mbt).sort((a,b)=>(mbt[a].days||0)-(mbt[b].days||0));
  if(sortedTerms.length>0){
    h+='<div class="table-card"><table><thead><tr><th>Plazo</th><th class="r">Margen</th><th class="r">#Facturas</th><th class="r">Normalizado</th></tr></thead><tbody>';
    sortedTerms.forEach(t=>{
      const d=mbt[t];
      h+=`<tr><td class="hi">${t}</td><td class="r">${fP(d.margin)}</td><td class="r">${d.count}</td><td class="r">${fP(d.normalizado)}</td></tr>`;
    });
    h+='</tbody></table><div class="note">Normalizado = margen + (30 − días) / 30 pp · Ref: 30 días = 0 ajuste</div></div>';
  }
  // Full weekly margin table with contado/crédito + per-term detail
  h+='<div class="section-label">Resumen Márgenes por Semana</div>';
  h+='<div class="table-card"><table><thead><tr>';
  h+='<th>Semana</th><th class="r">M.Contado</th><th class="r">M.Crédito</th><th class="r">#Fact</th><th class="r">M.Promedio</th>';
  h+='</tr></thead><tbody>';
  D.weeks.slice(0,fN).forEach((w,i)=>{
    const sel=i===selW;
    const wmc=w.margin_contado||0, wmcr=w.margin_credito||0;
    const wm=w.margin||0;
    const fc=(w.facturas_contado||0)+(w.facturas_credito||0);
    h+=`<tr style="${sel?'background:var(--accent-light)':''}">`;
    h+=`<td class="${sel?'hi':''}">${w.label}${w.parcial?' *':''}</td>`;
    h+=`<td class="r ${wmc>=mMeta?'ok':wmc>=mMeta*.85?'':'bad'}">${fP(wmc)}</td>`;
    h+=`<td class="r ${wmcr>=crMeta?'ok':wmcr>=crMeta*.85?'':'bad'}">${fP(wmcr)}</td>`;
    h+=`<td class="r">${fc||w.facturas||'—'}</td>`;
    h+=`<td class="r">${fP(wm)}</td>`;
    h+=`</tr>`;
    // Expandable per-term detail
    const bt=w.margin_by_term;
    if(bt&&Object.keys(bt).length>0){
      const terms=Object.keys(bt).sort((a,b)=>(bt[a].days||0)-(bt[b].days||0));
      terms.forEach(t=>{
        const d=bt[t];
        h+=`<tr style="font-size:10px;color:var(--text3)${sel?';background:var(--accent-light)':''}">`;
        h+=`<td style="padding-left:24px">${t}</td><td class="r">${fP(d.margin)}</td><td class="r">${fP(d.normalizado)}</td><td class="r">${d.count}</td><td></td></tr>`;
      });
    }
  });
  h+='</tbody></table><div class="note">Sub-filas: margen y normalizado por plazo · margin_zone ponderado · Jue→Mié</div></div>';

  // Margin charts
  h+='<div class="chart-row two">';
  h+='<div class="chart-card"><div class="chart-title">Margen Contado % <span class="badge">meta '+fP(mMeta)+'</span></div><div class="chart-wrap"><canvas id="cMgC"></canvas></div></div>';
  h+='<div class="chart-card"><div class="chart-title">Margen Crédito % <span class="badge">meta '+fP(crMeta)+'</span></div><div class="chart-wrap"><canvas id="cMgCr"></canvas></div></div>';
  h+='</div>';

  // ═══ SECTION 2: METAS ═══
  h+='<div class="section-label">Metas — Litros, Visitas y Clientes Nuevos</div>';
  h+='<div class="table-card"><table><thead><tr>';
  h+='<th>Semana</th><th class="r">Litros Ppto</th><th class="r">Litros Real</th><th class="r">%</th>';
  h+='<th class="r">Visitas</th><th class="r">Cotiz.Canc.</th><th class="r">Cli.Nuevos</th>';
  h+='</tr></thead><tbody>';
  D.weeks.slice(0,fN).forEach((w,i)=>{
    const sel=i===selW;
    const dv2=w.ppto>0?w.litros/w.ppto:0;
    h+=`<tr style="${sel?'background:var(--accent-light)':''}">`;
    h+=`<td class="${sel?'hi':''}">${w.label}${w.parcial?' *':''}</td>`;
    h+=`<td class="r">${fK(w.ppto)}</td>`;
    h+=`<td class="r">${fK(w.litros)}</td>`;
    h+=`<td class="r ${dv2>=.8?'ok':'bad'}">${(dv2*100).toFixed(0)}%</td>`;
    h+=`<td class="r">${w.visitas!=null?w.visitas:'—'}</td>`;
    h+=`<td class="r">${w.cotiz_canceladas!=null?w.cotiz_canceladas:'—'}</td>`;
    h+=`<td class="r">${w.clientes_nuevos!=null?w.clientes_nuevos:'—'}</td>`;
    h+=`</tr>`;
  });
  h+='</tbody></table></div>';

  h+='<div class="chart-row two">';
  h+='<div class="chart-card"><div class="chart-title">Visitas por semana <span class="badge">CRM Ruta</span></div><div class="chart-wrap"><canvas id="cVis"></canvas></div></div>';
  h+='<div class="chart-card"><div class="chart-title">Clientes Nuevos por semana <span class="badge">1ra factura</span></div><div class="chart-wrap"><canvas id="cCN"></canvas></div></div>';
  h+='</div>';

  // ═══ SECTION 3: SLA ENTREGA ═══
  const sla=D.sla||[];
  if(sla.length>0){
    h+='<div class="section-label">SLA Entrega — Cumplimiento por Zona</div>';
    // KPI for most recent week
    const slaW=sla[0];
    const zones=Object.keys(slaW.zones||{}).sort();
    const allTotal=Object.values(slaW.zones||{}).reduce((s,z)=>s+z.total,0);
    const allOT=Object.values(slaW.zones||{}).reduce((s,z)=>s+z.on_time,0);
    const allPct=allTotal>0?allOT/allTotal*100:100;
    h+='<div class="kpi-grid">';
    h+=kpi('SLA Global',allPct.toFixed(1)+'%',null,allPct>=slaTgt?'c-green':allPct>=90?'c-amber':'c-red',`${allOT}/${allTotal} entregas a tiempo · meta ${slaTgt}%`);
    zones.slice(0,5).forEach(z=>{
      const zd=slaW.zones[z];
      h+=kpi(z,zd.pct.toFixed(1)+'%',null,zd.pct>=slaTgt?'c-green':zd.pct>=90?'c-amber':'c-red',`${zd.on_time}/${zd.total} · ${zd.late} fuera`);
    });
    h+='</div>';
    // SLA table — all weeks × zones
    h+='<div class="table-card"><table><thead><tr><th>Semana</th>';
    const allZones=new Set();
    sla.forEach(s=>Object.keys(s.zones||{}).forEach(z=>allZones.add(z)));
    const zList=[...allZones].sort();
    zList.forEach(z=>h+=`<th class="r">${z}</th>`);
    h+='</tr></thead><tbody>';
    sla.forEach(s=>{
      h+=`<tr><td class="hi">${s.label}</td>`;
      zList.forEach(z=>{
        const zd=(s.zones||{})[z];
        if(!zd) {h+='<td class="r">—</td>';return;}
        const cls=zd.pct>=slaTgt?'ok':zd.pct>=90?'':'bad';
        h+=`<td class="r ${cls}">${zd.pct.toFixed(0)}% <span style="font-size:9px;color:var(--text3)">(${zd.total})</span></td>`;
      });
      h+=`</tr>`;
    });
    h+='</tbody></table><div class="note">Meta: '+slaTgt+'% entregas dentro de 24 hrs · stock.picking outgoing</div></div>';
  }

  // ═══ SECTION 4: RIESGO VIGENTE ═══
  const rg=D.riesgo;
  if(rg){
    h+='<div class="section-label">Riesgo Vigente — Cobertura Crédito</div>';
    h+='<div class="kpi-grid">';
    h+=kpi('No Cubierto',fM(rg.no_cubierto),null,'c-red',`${rg.no_cubierto_count} ventas · ${rg.pct_monto.toFixed(1)}% del total`);
    h+=kpi('Cubierto',fM(rg.cubierto),null,'c-green',`${rg.cubierto_count} ventas · ${(100-rg.pct_monto).toFixed(1)}% del total`);
    h+=kpi('Riesgo % Monto',rg.pct_monto.toFixed(1)+'%',null,rg.pct_monto<=10?'c-green':rg.pct_monto<=15?'c-amber':'c-red','meta <10%');
    h+=kpi('Riesgo % Ventas',rg.pct_count.toFixed(1)+'%',null,rg.pct_count<=10?'c-green':rg.pct_count<=15?'c-amber':'c-red','meta <10%');
    h+='</div>';
  }

  el.innerHTML=h;

  // ═══ CHARTS ═══
  const labels=wk.map(w=>w.label.split('-')[0]);
  const gC='rgba(0,0,0,.04)', tC='#9c9b96';

  dc('cMgC');charts.cMgC=new Chart(document.getElementById('cMgC'),{type:'bar',
    data:{labels,datasets:[
      {data:wk.map(w=>+((w.margin_contado||0)*100).toFixed(2)),
       backgroundColor:wk.map(w=>(w.margin_contado||0)>=mMeta?C.green+'88':C.red+'66'),borderRadius:5},
      {label:'Meta',data:wk.map(()=>mMeta*100),type:'line',borderColor:C.amber,backgroundColor:'transparent',pointRadius:0,borderWidth:2,borderDash:[5,3],tension:0}
    ]},options:co(tC,gC,v=>v.toFixed(1)+'%')});

  dc('cMgCr');charts.cMgCr=new Chart(document.getElementById('cMgCr'),{type:'bar',
    data:{labels,datasets:[
      {data:wk.map(w=>+((w.margin_credito||0)*100).toFixed(2)),
       backgroundColor:wk.map(w=>(w.margin_credito||0)>=crMeta?C.green+'88':C.red+'66'),borderRadius:5},
      {label:'Meta',data:wk.map(()=>crMeta*100),type:'line',borderColor:C.amber,backgroundColor:'transparent',pointRadius:0,borderWidth:2,borderDash:[5,3],tension:0}
    ]},options:co(tC,gC,v=>v.toFixed(1)+'%')});

  dc('cVis');charts.cVis=new Chart(document.getElementById('cVis'),{type:'bar',
    data:{labels,datasets:[
      {data:wk.map(w=>w.visitas||0),backgroundColor:wk.map(w=>(w.visitas||0)>=visMeta?C.blue+'88':C.red+'55'),borderRadius:5},
      {label:'Meta',data:wk.map(()=>visMeta),type:'line',borderColor:C.amber,backgroundColor:'transparent',pointRadius:0,borderWidth:2,borderDash:[5,3],tension:0}
    ]},options:co(tC,gC,v=>''+v)});

  dc('cCN');charts.cCN=new Chart(document.getElementById('cCN'),{type:'bar',
    data:{labels,datasets:[
      {data:wk.map(w=>w.clientes_nuevos||0),backgroundColor:wk.map(w=>(w.clientes_nuevos||0)>=cnMeta?C.green+'88':C.red+'55'),borderRadius:5},
      {label:'Meta',data:wk.map(()=>cnMeta),type:'line',borderColor:C.amber,backgroundColor:'transparent',pointRadius:0,borderWidth:2,borderDash:[5,3],tension:0}
    ]},options:co(tC,gC,v=>''+v)});
}
// ── COBRANZA ──
function renderCobranza(){
  const el=document.getElementById('p-cobranza');
  const r=D.receivables;
  if(!r){el.innerHTML='<div class="chart-card" style="text-align:center;padding:3rem;color:var(--text3)">Sin datos de cobranza</div>';return}
  const pO=r.total_due>0?(r.overdue/r.total_due*100):0;
  let h='<div class="kpi-grid">';
  h+=kpi('Total por Cobrar',fM(r.total_due),null,'c-blue',r.open_invoices+' facturas');
  h+=kpi('Al Día',fM(r.current),null,'c-green',(100-pO).toFixed(1)+'% del total');
  h+=kpi('Vencido',fM(r.overdue),null,'c-red',pO.toFixed(1)+'% del total');
  h+=kpi('Vencido 90+',fM(r.aging["90+"]||0),null,'c-amber','Cobranza crítica');
  h+='</div>';
  h+='<div class="section-label">Top Deudores</div><div class="table-card"><table><thead><tr><th>Cliente</th><th class="r">Monto Pendiente</th></tr></thead><tbody>';
  (r.top_debtors||[]).forEach(d=>{h+=`<tr><td>${d.name}</td><td class="r bad">${fM(d.amount)}</td></tr>`});
  h+='</tbody></table></div>';
  el.innerHTML=h;
}
// ── CAJA ──
function renderCaja(){
  const el=document.getElementById('p-caja');
  const bk=D.banks||[],tc=D.total_cash||0;
  let h=`<div class="kpi-grid"><div class="kpi c-green" style="grid-column:1/-1"><div class="kpi-label">Saldo Total</div><div class="kpi-val" style="font-size:32px">\$${fNum(tc)}</div><div class="kpi-sub">${bk.length} cuentas</div></div></div>`;
  h+='<div class="section-label">Saldos por Cuenta</div><div class="chart-card">';
  bk.forEach(b=>{
    const p=tc>0?(b.balance/tc*100):0;
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div style="width:120px;font-size:12px;color:var(--text2);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.name}</div><div style="flex:1;height:10px;background:var(--surface2);border-radius:5px;overflow:hidden"><div style="height:100%;width:${p}%;background:${b.balance>1e6?C.green:C.amber};border-radius:5px"></div></div><div style="width:90px;font-size:12px;font-weight:600;color:var(--text);text-align:right">\$${fNum(b.balance)}</div></div>`;
  });
  h+='</div>';
  h+='<div class="section-label">Recaudación Semanal</div><div class="table-card"><table><thead><tr><th>Semana</th><th class="r">Recaud.</th><th class="r">Transf.</th><th class="r">Cheques</th><th class="r">Factoring</th><th class="r">Compras</th></tr></thead><tbody>';
  D.weeks.slice(0,fN).forEach((w,i)=>{
    h+=`<tr style="${i===selW?'background:var(--accent-light)':''}"><td class="${i===selW?'hi':''}">${w.label}</td><td class="r">${fM(w.recaud)}</td><td class="r">${fM(w.transf||0)}</td><td class="r">${w.cheques?fM(w.cheques):'—'}</td><td class="r">${fM(w.factoring||0)}</td><td class="r">${fM(w.compras_odoo||w.compras_enap||0)}</td></tr>`;
  });
  h+='</tbody></table></div>';
  el.innerHTML=h;
}
// ── HELPERS ──
function kpi(label,val,delta,cls,sub){
  return `<div class="kpi ${cls}"><div class="kpi-label">${label}</div><div class="kpi-val">${val}</div>${dH(delta)}${sub?`<div class="kpi-sub">${sub}</div>`:''}</div>`;
}
function co(tC,gC,fmt){
  return{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{titleFont:{family:'DM Sans'},bodyFont:{family:'DM Sans'},backgroundColor:'#1a1a18',cornerRadius:8,padding:10}},
    scales:{x:{ticks:{color:tC,font:{size:9,family:'DM Sans'},maxRotation:50},grid:{display:false}},
            y:{ticks:{color:tC,font:{size:9,family:'DM Sans'},callback:v=>fmt(v)},grid:{color:gC}}}};
}
function dc(k){if(charts[k]){charts[k].destroy();delete charts[k]}}
// ── LOAD ──
async function loadData(){
  try{
    const r=await fetch('ceo-data.json?t='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    D=await r.json();
    const u=new Date(D.updated);
    document.getElementById('timestamp').textContent=u.toLocaleDateString('es-CL')+' '+u.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('ftr').textContent=`Odoo PRODUCCION · margin_zone · NC descontadas · ${u.toLocaleDateString('es-CL')}`;
    document.getElementById('loading').style.display='none';
    document.getElementById('main').style.display='block';
    setupTabs();render();
  }catch(e){
    document.getElementById('loading').innerHTML=`<div style="color:var(--red);text-align:center"><h3 style="font-size:16px;margin-bottom:8px">Error al cargar datos</h3><p style="font-size:12px;color:var(--text3)">${e.message}</p></div>`;
  }
}
loadData();
</script>
</body>
